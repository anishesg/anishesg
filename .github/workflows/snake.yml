name: generate snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: anishesg
          outputs: |
            dist/snake-dark.svg?palette=github-dark&color_snake=#A78BFA&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353
            dist/snake.svg?palette=github&color_snake=#7C3AED&color_dots=#ebedf0,#9be9a8,#40c463,#30a14e,#216e39

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
