<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A78BFA" />
      <stop offset="50%" style="stop-color:#818CF8" />
      <stop offset="100%" style="stop-color:#6366F1" />
    </linearGradient>
  </defs>

  <rect width="800" height="200" rx="12" fill="url(#bg)" />

  <rect x="0" y="0" width="800" height="36" rx="12" fill="#1a1e26" />
  <rect x="0" y="12" width="800" height="24" fill="#1a1e26" />

  <circle cx="24" cy="18" r="6" fill="#ff5f57" />
  <circle cx="44" cy="18" r="6" fill="#febc2e" />
  <circle cx="64" cy="18" r="6" fill="#28c840" />

  <text x="400" y="22" font-family="SF Mono, Fira Code, monospace" font-size="12" fill="#484f58" text-anchor="middle">anish@princeton ~ %</text>

  <text x="40" y="80" font-family="SF Mono, Fira Code, monospace" font-size="14" fill="#7d8590">
    <tspan fill="#A78BFA">$</tspan> whoami
  </text>

  <text x="40" y="115" font-family="SF Mono, Fira Code, monospace" font-size="24" fill="url(#accent)" font-weight="bold">
    anish kataria
  </text>

  <text x="40" y="150" font-family="SF Mono, Fira Code, monospace" font-size="14" fill="#7d8590">
    <tspan fill="#A78BFA">$</tspan> cat motto.txt
  </text>

  <text x="40" y="178" font-family="SF Mono, Fira Code, monospace" font-size="15" fill="#c9d1d9">
    building things that think
    <tspan fill="#A78BFA" font-weight="bold">_</tspan>
  </text>

  <style>
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    text tspan:last-child { animation: blink 1s step-end infinite; }
  </style>
</svg>
